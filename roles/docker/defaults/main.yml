---
docker_enabled: true

# Users that should be added to the docker group.
# Define in group_vars/host_vars, for example:
# docker_users:
#   - developer
docker_users: []

# Docker packages installed from the official Docker apt repository.
docker_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin

# Packages that may conflict with official Docker packages.
docker_remove_conflicting_packages:
  - docker.io
  - docker-compose
  - docker-compose-v2
  - docker-doc
  - podman-docker
  - containerd
  - runc

# Docker apt repository settings for Ubuntu/Debian.
docker_apt_keyrings_dir: /etc/apt/keyrings
docker_apt_gpg_key_path: /etc/apt/keyrings/docker.asc

docker_ubuntu_repo_url: https://download.docker.com/linux/ubuntu
docker_ubuntu_gpg_url: https://download.docker.com/linux/ubuntu/gpg

docker_debian_repo_url: https://download.docker.com/linux/debian
docker_debian_gpg_url: https://download.docker.com/linux/debian/gpg

# Astra Docker repository settings
docker_astra_use_official_repo: true
docker_astra_debian_codename: "stretch"
docker_astra_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io

docker_astra_optional_packages:
  - docker-buildx-plugin
  - docker-compose-plugin

docker_min_supported_version: "24.0.0"
docker_allow_unsupported_astra_version: false