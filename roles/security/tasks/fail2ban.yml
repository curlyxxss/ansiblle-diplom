---
- name: Install fail2ban on Ubuntu and Debian
  ansible.builtin.apt:
    name:
      - "{{ security_fail2ban_package }}"
      - python3-systemd
    state: present
    update_cache: true
  when:
    - security_fail2ban_enabled | bool
    - ansible_facts['distribution'] in ["Ubuntu", "Debian"]

- name: Install fail2ban on Astra Linux
  ansible.builtin.raw: |
    apt-get update
    apt-get install -y {{ security_fail2ban_package }}
  changed_when: false
  when:
    - security_fail2ban_enabled | bool
    - ansible_facts['distribution_release'] | default('') == "orel"

- name: Ensure fail2ban jail.d directory exists
  ansible.builtin.file:
    path: /etc/fail2ban/jail.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: security_fail2ban_enabled | bool

- name: Configure fail2ban sshd jail
  ansible.builtin.copy:
    dest: "/etc/fail2ban/jail.d/{{ security_fail2ban_jail_name }}.local"
    owner: root
    group: root
    mode: "0644"
    content: |
      [{{ security_fail2ban_jail_name }}]
      enabled = true
      port = ssh
      filter = sshd
      backend = {{ security_fail2ban_backend }}
      maxretry = {{ security_fail2ban_maxretry }}
      findtime = {{ security_fail2ban_findtime }}
      bantime = {{ security_fail2ban_bantime }}
      {% if security_fail2ban_sshd_logpath | length > 0 %}
      logpath = {{ security_fail2ban_sshd_logpath }}
      {% endif %}
  notify: Restart fail2ban
  when: security_fail2ban_enabled | bool

- name: Ensure fail2ban service is enabled and started
  ansible.builtin.service:
    name: "{{ security_fail2ban_service }}"
    state: started
    enabled: true
  when: security_fail2ban_enabled | bool