---
- name: Install fail2ban on Ubuntu/Debian
  ansible.builtin.apt:
    name: "{{ security_fail2ban_package }}"
    state: present
    update_cache: true
    lock_timeout: 300
  when:
    - security_fail2ban_enabled | bool
    - ansible_facts['distribution'] in ["Ubuntu", "Debian"]

- name: Install fail2ban on Astra
  ansible.builtin.raw: >
    DEBIAN_FRONTEND=noninteractive apt-get install -y {{ security_fail2ban_package }}
  register: astra_fail2ban_install
  changed_when: "'0 upgraded, 0 newly installed' not in astra_fail2ban_install.stdout"
  when:
    - security_fail2ban_enabled | bool
    - ansible_facts['distribution_release'] == "orel"

- name: Check if fail2ban directory exists
  ansible.builtin.stat:
    path: /etc/fail2ban
  register: fail2ban_dir_stat
  when: security_fail2ban_enabled | bool

- name: Fail if fail2ban directory does not exist after installation
  ansible.builtin.fail:
    msg: "fail2ban is not installed correctly: /etc/fail2ban does not exist"
  when:
    - security_fail2ban_enabled | bool
    - not fail2ban_dir_stat.stat.exists

- name: Create fail2ban jail.local
  ansible.builtin.copy:
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: "0644"
    content: |
      [sshd]
      enabled = true
      port = ssh
      backend = {{ security_fail2ban_backend }}
      logpath = {{ security_fail2ban_sshd_logpath }}
      maxretry = {{ security_fail2ban_maxretry }}
      bantime = {{ security_fail2ban_bantime }}
  when:
    - security_fail2ban_enabled | bool
    - fail2ban_dir_stat.stat.exists
  notify: Restart fail2ban

- name: Ensure fail2ban is enabled and started
  ansible.builtin.service:
    name: "{{ security_fail2ban_service }}"
    state: started
    enabled: true
  when:
    - security_fail2ban_enabled | bool
    - fail2ban_dir_stat.stat.exists
