---
# Harden SSH configuration

- name: Ensure sshd_config exists
  ansible.builtin.stat:
    path: "{{ security_sshd_config_path }}"
  register: sshd_config_stat

- name: Fail if sshd_config not found
  ansible.builtin.fail:
    msg: "sshd_config not found"
  when: not sshd_config_stat.stat.exists

- name: Disable root login
  ansible.builtin.lineinfile:
    path: "{{ security_sshd_config_path }}"
    regexp: '^#?PermitRootLogin'
    line: "PermitRootLogin {{ security_ssh_permit_root_login }}"
    create: true
    backup: true
  notify: Restart SSH service

- name: Disable password authentication
  ansible.builtin.lineinfile:
    path: "{{ security_sshd_config_path }}"
    regexp: '^#?PasswordAuthentication'
    line: "PasswordAuthentication {{ security_ssh_password_authentication }}"
    create: true
  notify: Restart SSH service

- name: Ensure public key authentication is enabled
  ansible.builtin.lineinfile:
    path: "{{ security_sshd_config_path }}"
    regexp: '^#?PubkeyAuthentication'
    line: "PubkeyAuthentication {{ security_ssh_pubkey_authentication }}"
    create: true
  notify: Restart SSH service

- name: Restrict SSH access to allowed users
  ansible.builtin.lineinfile:
    path: "{{ security_sshd_config_path }}"
    regexp: '^#?AllowUsers'
    line: "AllowUsers {{ security_ssh_allow_users | join(' ') }}"
    create: true
  notify: Restart SSH service

- name: Set MaxAuthTries
  ansible.builtin.lineinfile:
    path: "{{ security_sshd_config_path }}"
    regexp: '^#?MaxAuthTries'
    line: "MaxAuthTries {{ security_ssh_max_auth_tries }}"
    create: true
  notify: Restart SSH service

- name: Set LoginGraceTime
  ansible.builtin.lineinfile:
    path: "{{ security_sshd_config_path }}"
    regexp: '^#?LoginGraceTime'
    line: "LoginGraceTime {{ security_ssh_login_grace_time }}"
    create: true
  notify: Restart SSH service

- name: Set ClientAliveInterval
  ansible.builtin.lineinfile:
    path: "{{ security_sshd_config_path }}"
    regexp: '^#?ClientAliveInterval'
    line: "ClientAliveInterval {{ security_ssh_client_alive_interval }}"
    create: true
  notify: Restart SSH service

- name: Set ClientAliveCountMax
  ansible.builtin.lineinfile:
    path: "{{ security_sshd_config_path }}"
    regexp: '^#?ClientAliveCountMax'
    line: "ClientAliveCountMax {{ security_ssh_client_alive_count_max }}"
    create: true
  notify: Restart SSH service

- name: Set PermitEmptyPasswords
  ansible.builtin.lineinfile:
    path: "{{ security_sshd_config_path }}"
    regexp: '^#?\s*PermitEmptyPasswords\s+'
    line: "PermitEmptyPasswords {{ security_ssh_permit_empty_passwords }}"
    backup: true
  notify: Restart SSH service

- name: Set X11Forwarding
  ansible.builtin.lineinfile:
    path: "{{ security_sshd_config_path }}"
    regexp: '^#?\s*X11Forwarding\s+'
    line: "X11Forwarding {{ security_ssh_x11_forwarding }}"
    backup: true
  notify: Restart SSH service

- name: Set AllowTcpForwarding
  ansible.builtin.lineinfile:
    path: "{{ security_sshd_config_path }}"
    regexp: '^#?\s*AllowTcpForwarding\s+'
    line: "AllowTcpForwarding {{ security_ssh_allow_tcp_forwarding }}"
    backup: true
  notify: Restart SSH service

- name: Set MaxSessions
  ansible.builtin.lineinfile:
    path: "{{ security_sshd_config_path }}"
    regexp: '^#?\s*MaxSessions\s+'
    line: "MaxSessions {{ security_ssh_max_sessions }}"
    backup: true
  notify: Restart SSH service

- name: Set MaxStartups
  ansible.builtin.lineinfile:
    path: "{{ security_sshd_config_path }}"
    regexp: '^#?\s*MaxStartups\s+'
    line: "MaxStartups {{ security_ssh_max_startups }}"
    backup: true
  notify: Restart SSH service

- name: Validate sshd configuration
  ansible.builtin.command: sshd -t
  changed_when: false

