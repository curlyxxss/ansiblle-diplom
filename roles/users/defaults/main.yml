---
# Enable or disable user management role
users_manage_accounts: true

# Default values for managed users
users_default_shell: /bin/bash
users_default_groups: []

# Default home directory base path
users_home_base: /home

# Users list is expected to be defined in inventory/group_vars/host_vars
users: []

# Safety switch.
# The role does NOT remove unmanaged users automatically.
# Users are removed only when explicitly configured with state: absent.
users_remove_unmanaged: false

# Default behavior for absent users
users_absent_remove_home: false

# Sudoers validation command.
# On Ubuntu, Debian and Astra Linux this path is normally provided by the sudo package.
users_sudoers_validate_path: /usr/sbin/visudo