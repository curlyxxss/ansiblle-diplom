---
- name: Configure Git user.name for dev users
  ansible.builtin.git_config:
    name: user.name
    value: "{{ dev_git_user_name }}"
    scope: global
  become: true
  become_user: "{{ item }}"
  loop: "{{ dev_users }}"
  environment:
    HOME: "/home/{{ item }}"
  when:
    - dev_git_user_name | length > 0
    - dev_users | length > 0

- name: Configure Git user.email for dev users
  ansible.builtin.git_config:
    name: user.email
    value: "{{ dev_git_user_email }}"
    scope: global
  become: true
  become_user: "{{ item }}"
  loop: "{{ dev_users }}"
  environment:
    HOME: "/home/{{ item }}"
  when:
    - dev_git_user_email | length > 0
    - dev_users | length > 0