---
users:
  - name: devuser
    state: present
    shell: /bin/bash
    groups:
      - sudo
    ssh_keys:
      - "~/.ssh/diplom.pub"
    sudo: true
    sudo_nopasswd: true

docker_users:
  - devuser
  
dev_users:
  - devuser

dev_git_config_enabled: true
dev_git_user_name: "Dev User"
dev_git_user_email: "devuser@example.com"