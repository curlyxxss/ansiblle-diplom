[defaults]
# Main inventory file. The real inventory is environment-specific and ignored by Git.
# Use inventories/inventory.ini.example as a template.
inventory = ./inventories/inventory.ini

# Directory with project roles.
roles_path = ./roles

# Disable creation of *.retry files after failed playbook runs.
retry_files_enabled = False

# Host key checking should be enabled in production.
# It may be disabled in a local test lab, but production usage should manage known_hosts explicitly.
host_key_checking = True

# Avoid noisy interpreter warnings when Ansible discovers Python automatically.
interpreter_python = auto_silent

# Use Ansible default callback with YAML-like output.
stdout_callback = default
result_format = yaml

[ssh_connection]
# Improves SSH performance by reducing extra SSH operations.
pipelining = True

# Use a predictable temporary directory on managed hosts.
# This avoids issues with default remote tmp paths and privilege escalation.
remote_tmp = /tmp/.ansible-${USER}/tmp
